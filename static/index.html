<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 TRIZ 智能体 · 赛博蓝白</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ---------- 全局 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #eef4ff;
            min-height: 100vh;
            padding: 24px 20px 40px;
            background-image: 
                linear-gradient(rgba(0, 80, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 80, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
        }

        .app-wrapper {
            max-width: 900px;
            width: 100%;
        }

        /* ---------- 启动遮罩 ---------- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #eef4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease-out 0.5s forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        #splash-title {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0044cc, #3a7eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(0, 80, 255, 0.2);
            animation: glitch 1.2s infinite alternate;
            text-align: center;
            padding: 0 20px;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            5% { transform: skew(2deg); text-shadow: 0 0 20px #0088ff, 0 0 60px #0044ff; }
            10% { transform: skew(-2deg); }
            15% { transform: skew(0deg); }
        }

        /* ---------- 主容器淡入 ---------- */
        .app-container {
            opacity: 0;
            animation: appear 0.4s ease-out 0.8s forwards;
        }

        @keyframes appear {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ---------- AI 助手头部 ---------- */
        .ai-assistant-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 100, 255, 0.2);
            border-radius: 60px;
            padding: 14px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 6px 24px rgba(0, 60, 200, 0.08);
        }

        .ai-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #0066ff, #3a7eff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 0 30px rgba(0, 80, 255, 0.25);
            flex-shrink: 0;
        }

        .ai-status {
            flex: 1;
        }

        .ai-status .name {
            font-weight: 600;
            color: #00337a;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .ai-status .name .badge-online {
            background: #00b894;
            color: white;
            font-size: 0.6rem;
            padding: 2px 12px;
            border-radius: 40px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .ai-status .greeting {
            color: #4d7ab8;
            font-size: 0.9rem;
            margin-top: 2px;
        }

        .ai-quick-tips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .ai-quick-tips .tip {
            background: rgba(0, 100, 255, 0.08);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #0044cc;
            border: 1px solid rgba(0, 100, 255, 0.1);
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .ai-quick-tips .tip:hover {
            background: rgba(0, 100, 255, 0.15);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.1);
        }

        /* ---------- 赛博卡片 ---------- */
        .cyber-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 100, 255, 0.2);
            border-radius: 28px;
            padding: 1.8rem 2rem;
            box-shadow: 0 12px 40px -12px rgba(0, 50, 150, 0.12);
            margin-bottom: 28px;
            transition: all 0.25s;
        }

        .cyber-card:hover {
            box-shadow: 0 20px 50px -10px rgba(0, 80, 255, 0.18);
            border-color: rgba(0, 120, 255, 0.3);
        }

        .cyber-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #003c9e;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.2rem;
        }

        .cyber-title i {
            color: #0066ff;
            font-size: 1.5rem;
        }

        .assistant-bubble {
            background: rgba(0, 80, 255, 0.04);
            border-radius: 16px;
            padding: 12px 18px;
            margin-top: 16px;
            border-left: 4px solid #0066ff;
            font-size: 0.9rem;
            color: #00337a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .assistant-bubble i {
            color: #0066ff;
            font-size: 1.2rem;
        }

        .assistant-bubble .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #0066ff;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ---------- 输入 & 按钮 ---------- */
        .cyber-input {
            width: 100%;
            padding: 14px 22px;
            background: white;
            border: 2px solid #cce0ff;
            border-radius: 60px;
            font-size: 1rem;
            color: #002266;
            outline: none;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 60, 200, 0.04);
        }

        .cyber-input:focus {
            border-color: #3a7eff;
            box-shadow: 0 0 0 4px rgba(0, 100, 255, 0.12), 0 0 30px rgba(0, 100, 255, 0.06);
        }

        .cyber-input::placeholder {
            color: #8ab0e6;
            font-weight: 300;
        }

        .btn-cyber {
            padding: 14px 32px;
            background: linear-gradient(145deg, #0066ff, #3a7eff);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0, 80, 255, 0.2);
            white-space: nowrap;
        }

        .btn-cyber:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 80, 255, 0.35);
            background: linear-gradient(145deg, #1a75ff, #4f8eff);
        }

        .btn-cyber:active { transform: scale(0.98); }

        .btn-outline-cyber {
            background: transparent;
            border: 2px solid #3a7eff;
            color: #0044cc;
            box-shadow: none;
        }

        .btn-outline-cyber:hover {
            background: #e6f0ff;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.08);
        }

        /* ---------- 矛盾分析 ---------- */
        .analysis-area .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .analysis-area .input-group .cyber-input {
            flex: 1;
            min-width: 200px;
        }

        #resultContainer {
            margin-top: 18px;
        }

        .result-box {
            background: rgba(0, 80, 255, 0.04);
            border-radius: 20px;
            padding: 16px 20px;
            border-left: 6px solid #0066ff;
        }

        .result-grid-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }

        .result-item-mini {
            background: white;
            padding: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .result-item-mini .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #4d7ab8;
            letter-spacing: 1px;
        }

        .result-item-mini .value {
            font-size: 1.3rem;
            font-weight: 600;
            color: #002266;
            margin-top: 2px;
        }

        .result-item-mini.improve .value { color: #0066cc; }
        .result-item-mini.worsen .value { color: #cc3b4b; }

        /* ---------- 矛盾矩阵 ---------- */
        .matrix-area .matrix-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        @media (max-width: 600px) {
            .matrix-area .matrix-input-group {
                grid-template-columns: 1fr;
            }
        }

        #matrixResult {
            margin-top: 16px;
            padding: 14px 18px;
            background: rgba(0, 100, 255, 0.04);
            border-radius: 18px;
            border: 1px dashed #8ab8ff;
            color: #00337a;
            font-size: 0.95rem;
        }

        .matrix-solution {
            background: white;
            padding: 16px 20px;
            border-radius: 18px;
            border-left: 6px solid #00b894;
        }

        .matrix-solution ul {
            padding-left: 24px;
            margin-top: 6px;
        }

        .matrix-solution li {
            margin: 4px 0;
            list-style: none;
        }

        .matrix-solution li::before {
            content: "💡 ";
        }

        /* ---------- 历史记录 ---------- */
        .history-area .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .history-area .search-box .cyber-input {
            flex: 1;
        }

        .history-list {
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 5px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #dce6f5;
            border-radius: 10px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #3a7eff;
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 80, 200, 0.08);
            align-items: center;
            border-radius: 12px;
            transition: 0.1s;
        }

        .history-item:hover {
            background: rgba(0, 80, 255, 0.05);
        }

        .history-item .req {
            flex: 1;
            font-weight: 500;
            color: #00337a;
        }

        .history-item .params {
            font-size: 0.8rem;
            color: #0066cc;
            background: #e6f0ff;
            padding: 2px 14px;
            border-radius: 40px;
            margin: 0 12px;
        }

        .history-item .time {
            font-size: 0.7rem;
            color: #6f8fc0;
        }

        .empty-history {
            color: #8ab0d0;
            text-align: center;
            padding: 30px 0;
        }

        /* ---------- 加载 ---------- */
        .loading-spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .loading-text {
            color: #0066cc;
            font-weight: 500;
        }

        /* ---------- 响应式 ---------- */
        @media (max-width: 600px) {
            .ai-assistant-header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                border-radius: 28px;
            }
            .ai-quick-tips {
                margin-left: 0;
                justify-content: center;
            }
            .cyber-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- ========== 启动遮罩 ========== -->
    <div id="splash-screen">
        <div id="splash-title">TRIZ 大模型智能体创新助手</div>
    </div>

    <!-- ========== 主应用 ========== -->
    <div class="app-wrapper">
        <div class="app-container">

            <!-- AI 助手头部 -->
            <div class="ai-assistant-header">
                <div class="ai-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="ai-status">
                    <div class="name">
                        <span>TRIZ 智能体 · 星云</span>
                        <span class="badge-online"><i class="fas fa-circle" style="font-size:0.5rem; margin-right:4px;"></i>在线</span>
                    </div>
                    <div class="greeting">
                        <i class="fas fa-comment-dots" style="margin-right:6px;"></i>
                        你好，我是你的创新助手。输入矛盾，我来帮你分析。
                    </div>
                </div>
                <div class="ai-quick-tips">
                    <span class="tip" onclick="document.getElementById('requirementInput').value='手机屏幕更大但单手不好拿'; analyze();">
                        <i class="fas fa-bolt"></i> 示例
                    </span>
                    <span class="tip" onclick="document.getElementById('requirementInput').value='电池续航短但机身要轻薄'; analyze();">
                        <i class="fas fa-lightbulb"></i> 续航
                    </span>
                </div>
            </div>

            <!-- ========== 1. 矛盾分析 ========== -->
            <div class="cyber-card analysis-area">
                <div class="cyber-title"><i class="fas fa-bolt"></i> 矛盾分析</div>
                <div class="input-group">
                    <input id="requirementInput" class="cyber-input" placeholder="例如：手机屏幕更大但单手不好拿" />
                    <button class="btn-cyber" onclick="analyze()"><i class="fas fa-arrow-right"></i> 分析</button>
                </div>
                <div id="resultContainer">
                    <!-- 结果动态渲染 -->
                </div>
                <div id="loadingIndicator" style="display:none; margin-top:12px;">
                    <span class="loading-spinner"><i class="fas fa-circle-notch"></i></span>
                    <span class="loading-text"> 分析中（模型加载约10-20s）…</span>
                </div>
                <div class="assistant-bubble">
                    <i class="fas fa-robot"></i>
                    <span>💡 试着描述一个技术矛盾，我会提取改善与恶化参数。</span>
                    <span class="typing-cursor"></span>
                </div>
            </div>

            <!-- ========== 2. 矛盾矩阵 ========== -->
            <div class="cyber-card matrix-area">
                <div class="cyber-title"><i class="fas fa-cubes"></i> 矛盾矩阵</div>
                <div class="matrix-input-group">
                    <input id="matrixImprove" class="cyber-input" placeholder="改善参数 (如: 屏幕尺寸)" />
                    <input id="matrixWorsen" class="cyber-input" placeholder="恶化参数 (如: 单手操作性)" />
                </div>
                <button class="btn-cyber" onclick="getRecommendation()"><i class="fas fa-flask"></i> 获取方案</button>
                <div id="matrixResult"><span style="color:#6f8fc0;">输入参数后点击获取，AI 将推荐原理</span></div>
                <div class="assistant-bubble">
                    <i class="fas fa-robot"></i>
                    <span>🧠 我会根据 TRIZ 矩阵推荐最合适的发明原理。</span>
                </div>
            </div>

            <!-- ========== 3. 历史记录 ========== -->
            <div class="cyber-card history-area">
                <div class="cyber-title"><i class="fas fa-history"></i> 历史记录</div>
                <div class="search-box">
                    <input id="searchInput" class="cyber-input" placeholder="🔍 搜索历史..." oninput="searchHistory()" />
                    <button class="btn-cyber btn-outline-cyber" onclick="loadHistory()"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div id="historyList" class="history-list">
                    <div class="empty-history"><i class="fas fa-database"></i> 暂无记录</div>
                </div>
                <div class="assistant-bubble">
                    <i class="fas fa-robot"></i>
                    <span>📋 所有分析记录都会保存在这里，方便追溯。</span>
                </div>
            </div>

        </div><!-- end app-container -->
    </div><!-- end app-wrapper -->

    <script>
        // ===================== API 配置 =====================
        const API_BASE = 'http://127.0.0.1:8000/api/triz';

        // ===================== 矛盾分析 =====================
        async function analyze() {
            const input = document.getElementById('requirementInput');
            const text = input.value.trim();
            if (!text) { alert('请输入需求'); return; }

            const loading = document.getElementById('loadingIndicator');
            loading.style.display = 'block';
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = '';

            try {
                const submitRes = await fetch(`${API_BASE}/requirement`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requirement_text: text })
                });
                const submitData = await submitRes.json();
                const taskId = submitData.data.task_id;

                await fetch(`${API_BASE}/extract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                });

                let result = null;
                let processingTime = 0;
                for (let i = 0; i < 40; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    const resultRes = await fetch(`${API_BASE}/result/${taskId}`);
                    const resultData = await resultRes.json();
                    if (resultData.data.status === 'completed') {
                        result = resultData.data.result;
                        processingTime = resultData.data.processing_time_ms || 0;
                        break;
                    }
                }

                if (result) {
                    displayResult(result, processingTime);
                    loadHistory();
                } else {
                    resultContainer.innerHTML = '<div class="result-box" style="color:#cc3b4b;">⏱ 分析超时，请重试</div>';
                }
            } catch (e) {
                resultContainer.innerHTML = `<div class="result-box" style="color:#cc3b4b;">❌ 请求失败: ${e.message}</div>`;
            }
            loading.style.display = 'none';
        }

        function displayResult(result, time) {
            const container = document.getElementById('resultContainer');
            const improve = result['改善参数'] || '';
            const worsen = result['恶化参数'] || '';
            container.innerHTML = `
                <div class="result-box">
                    <div style="margin-bottom:8px; color:#00337a; font-weight:500;">
                        <i class="fas fa-quote-left" style="color:#0066ff;"></i> ${result['原始需求']}
                    </div>
                    <div class="result-grid-mini">
                        <div class="result-item-mini improve">
                            <div class="label"><i class="fas fa-arrow-up"></i> 改善</div>
                            <div class="value">${improve}</div>
                        </div>
                        <div class="result-item-mini worsen">
                            <div class="label"><i class="fas fa-arrow-down"></i> 恶化</div>
                            <div class="value">${worsen}</div>
                        </div>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:12px; margin-top:6px; font-size:0.9rem; color:#335e8a;">
                        <span><i class="far fa-clock"></i> ${time}ms</span>
                        <span><i class="fas fa-code-branch"></i> ${result['矛盾描述']}</span>
                    </div>
                    <div style="margin-top:12px;">
                        <button class="btn-cyber" style="padding:8px 24px; font-size:0.9rem;" 
                                onclick="jumpToMatrix('${improve}', '${worsen}')">
                            <i class="fas fa-brain"></i> 查看方案
                        </button>
                    </div>
                </div>
            `;
        }

        function jumpToMatrix(improve, worsen) {
            document.getElementById('matrixImprove').value = improve;
            document.getElementById('matrixWorsen').value = worsen;
            getRecommendation();
            document.querySelector('.matrix-area').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // ===================== 矛盾矩阵 =====================
        async function getRecommendation() {
            const improve = document.getElementById('matrixImprove').value.trim();
            const worsen = document.getElementById('matrixWorsen').value.trim();
            if (!improve || !worsen) { alert('请输入改善参数和恶化参数'); return; }
            await fetchRecommendation(improve, worsen);
        }

        async function fetchRecommendation(improve, worsen) {
            const container = document.getElementById('matrixResult');
            container.innerHTML = '<span style="color:#335e8a;"><i class="fas fa-spinner fa-pulse"></i> 查询中…</span>';
            try {
                const res = await fetch(`${API_BASE}/matrix/recommend?improve=${encodeURIComponent(improve)}&worsen=${encodeURIComponent(worsen)}`);
                const data = await res.json();
                const result = data.data;
                
                // 🔥 修复：检查是否有匹配，使用 '推荐原理名称' 字段
                if (result.是否有匹配 && result.推荐原理名称 && result.推荐原理名称.length > 0) {
                    container.innerHTML = `
                        <div class="matrix-solution">
                            <strong style="color:#0066cc;"><i class="fas fa-lightbulb"></i> 推荐方案（TRIZ 发明原理）</strong>
                            <ul>
                                ${result.推荐原理名称.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                            <div style="margin-top:8px; font-size:0.8rem; color:#6f8fc0;">
                                <i class="fas fa-info-circle"></i> 基于 TRIZ 矛盾矩阵推荐
                            </div>
                        </div>
                    `;
                } else if (result.推荐原理 && result.推荐原理.length > 0) {
                    // 兼容旧字段
                    container.innerHTML = `
                        <div class="matrix-solution">
                            <strong style="color:#0066cc;"><i class="fas fa-lightbulb"></i> 推荐方案</strong>
                            <ul>
                                ${result.推荐原理.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div style="background:#fff3cd; padding:14px 18px; border-radius:12px; border-left:4px solid #ffc107;">
                            <span style="color:#856404;">😕 未找到精确匹配</span>
                            <div style="font-size:0.85rem; margin-top:6px; color:#6f8fc0;">
                                尝试使用标准参数名：<br/>
                                改善参数：运动物体的面积（5）<br/>
                                恶化参数：可操作性（33）
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                container.innerHTML = `<span style="color:#cc3b4b;">❌ 请求失败: ${e.message}</span>`;
            }
        }

        // ===================== 历史记录 =====================
        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/history`);
                const data = await res.json();
                renderHistory(data.data.records || []);
            } catch (e) {
                console.error('加载历史失败:', e);
            }
        }

        function renderHistory(records) {
            const container = document.getElementById('historyList');
            if (!records || records.length === 0) {
                container.innerHTML = '<div class="empty-history"><i class="fas fa-database"></i> 暂无记录</div>';
                return;
            }
            container.innerHTML = records.map(r => `
                <div class="history-item">
                    <span class="req"><i class="fas fa-comment" style="color:#0066ff; margin-right:10px;"></i>${r.requirement || '未知需求'}</span>
                    <span class="params">${r.improve_param || '?'} → ${r.worsen_param || '?'}</span>
                    <span class="time"><i class="far fa-calendar-alt"></i> ${r.created_at ? new Date(r.created_at).toLocaleString() : ''}</span>
                </div>
            `).join('');
        }

        async function searchHistory() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) { loadHistory(); return; }
            try {
                const res = await fetch(`${API_BASE}/history?keyword=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                renderHistory(data.data.records || []);
            } catch (e) {
                console.error('搜索失败:', e);
            }
        }

        // ===================== 初始化 =====================
        loadHistory();

        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if (splash) splash.style.display = 'none';
        }, 800);
    </script>
</body>
</html>
